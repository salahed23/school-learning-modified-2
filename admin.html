<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration | School-learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar { background-color: #1F2937; }
        .active-link { background-color: #374151; border-left: 4px solid #3B82F6; }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="sidebar w-64 flex-shrink-0 flex flex-col">
        <div class="p-6 flex items-center gap-2">
            <span class="text-2xl">📘</span>
            <span class="text-xl font-bold text-[#3B82F6]">School-learning</span>
        </div>
        <nav class="flex-1 mt-4">
            <a href="#" class="flex items-center gap-3 px-6 py-3 text-white active-link">
                <span>👥</span> Gestion Utilisateurs
            </a>
        </nav>
        <div class="p-6 border-t border-gray-700">
            <a href="index.html" class="flex items-center gap-3 text-red-400 hover:text-red-300">
                <span>🚪</span> Déconnexion
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">Panel d'Administration 🏛️</h1>
            <div class="flex items-center gap-4">
                <button class="bg-[#3B82F6] text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-600 transition shadow-md">
                    ➕ Ajouter un Utilisateur
                </button>
                <div class="flex items-center gap-2 border-l pl-4">
                    <div class="w-10 h-10 rounded-full bg-red-500 flex items-center justify-center text-white font-bold">A</div>
                    <span class="font-medium text-gray-700">Administrateur</span>
                </div>
            </div>
        </header>

        <!-- Content -->
        <div class="p-8 overflow-y-auto">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-xl font-bold text-gray-800">Liste des Utilisateurs</h2>
                    <div class="relative">
                        <input type="text" placeholder="Rechercher..." class="pl-10 pr-4 py-2 border rounded-xl outline-none focus:border-blue-500">
                        <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-gray-400 text-sm border-b">
                                <th class="pb-4 font-semibold uppercase tracking-wider">Nom complet</th>
                                <th class="pb-4 font-semibold uppercase tracking-wider">Email</th>
                                <th class="pb-4 font-semibold uppercase tracking-wider">Rôle</th>
                                <th class="pb-4 font-semibold uppercase tracking-wider text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            <tr class="hover:bg-gray-50 transition">
                                <td class="py-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-xs">S</div>
                                        <span class="font-medium">Salah Eddine</span>
                                    </div>
                                </td>
                                <td class="py-4 text-gray-600 text-sm">salah@school.com</td>
                                <td class="py-4">
                                    <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-xs font-bold">Étudiant</span>
                                </td>
                                <td class="py-4 text-right">
                                    <button class="text-[#3B82F6] hover:text-blue-700 font-medium mr-4">Modifier</button>
                                    <button class="text-red-500 hover:text-red-700 font-medium">Supprimer</button>
                                </td>
                            </tr>
                            <tr class="hover:bg-gray-50 transition">
                                <td class="py-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-8 h-8 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center font-bold text-xs">D</div>
                                        <span class="font-medium">M. Dupont</span>
                                    </div>
                                </td>
                                <td class="py-4 text-gray-600 text-sm">dupont@school.com</td>
                                <td class="py-4">
                                    <span class="bg-purple-100 text-purple-600 px-3 py-1 rounded-full text-xs font-bold">Enseignant</span>
                                </td>
                                <td class="py-4 text-right">
                                    <button class="text-[#3B82F6] hover:text-blue-700 font-medium mr-4">Modifier</button>
                                    <button class="text-red-500 hover:text-red-700 font-medium">Supprimer</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
