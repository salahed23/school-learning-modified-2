<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S'inscrire | School-learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
        <div class="p-8">
            <div class="flex items-center gap-2 mb-8 justify-center">
                <span class="text-3xl">📘</span>
                <span class="text-2xl font-bold text-[#3B82F6]">School-learning</span>
            </div>
            
            <h2 class="text-2xl font-bold text-gray-800 mb-2 text-center">Commencez dès aujourd'hui</h2>
            <p class="text-gray-500 text-center mb-8">Rejoignez notre communauté d'apprentissage.</p>

            <form action="dashboard_student.html" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Prénom</label>
                    <input type="text" placeholder="Salah" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#3B82F6] focus:ring-2 focus:ring-[#3B82F6]/20 outline-none transition" required>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Nom</label>
                    <input type="text" placeholder="Eddine" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#3B82F6] focus:ring-2 focus:ring-[#3B82F6]/20 outline-none transition" required>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Adresse Email</label>
                    <input type="email" placeholder="nom@exemple.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#3B82F6] focus:ring-2 focus:ring-[#3B82F6]/20 outline-none transition" required>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Rôle</label>
                    <select class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#3B82F6] focus:ring-2 focus:ring-[#3B82F6]/20 outline-none transition bg-white" required>
                        <option value="Etudiant">Je suis un Étudiant</option>
                        <option value="Enseignant">Je suis un Enseignant</option>
                    </select>
                </div>
                
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Mot de passe</label>
                    <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#3B82F6] focus:ring-2 focus:ring-[#3B82F6]/20 outline-none transition" minlength="12" required>
                    <p class="text-[10px] text-gray-400 mt-1">Min. 12 caractères (Règle métier RM1)</p>
                </div>

                <button type="submit" class="md:col-span-2 w-full bg-[#3B82F6] text-white py-4 rounded-xl font-bold hover:bg-blue-600 transition shadow-lg shadow-blue-200">
                    Créer mon compte
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-gray-500">Déjà inscrit ? <a href="login.html" class="text-[#3B82F6] font-bold hover:underline">Se connecter</a></p>
            </div>
        </div>
        
        <div class="bg-gray-50 p-4 border-t border-gray-100 text-center">
            <a href="index.html" class="text-sm text-gray-400 hover:text-gray-600">← Retour à l'accueil</a>
        </div>
    </div>

</body>
</html>
